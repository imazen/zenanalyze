name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }} / ${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-11-arm, macos-15-intel, macos-latest]
        features: ["", "experimental", "composites", "experimental,composites"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        if: matrix.features == 'experimental,composites' && matrix.os == 'ubuntu-latest'
        run: cargo fmt --check
      - name: Clippy
        if: matrix.features == 'experimental,composites' && matrix.os == 'ubuntu-latest'
        run: cargo clippy --features "${{ matrix.features }}" --all-targets -- -D warnings
      - name: Build
        run: cargo build --no-default-features --features "${{ matrix.features }}"
      - name: Test
        run: cargo test --no-default-features --features "${{ matrix.features }}" --lib
      - name: Build zenpicker
        run: cargo build -p zenpicker
      - name: Test zenpicker
        run: cargo test -p zenpicker --lib
      - name: Clippy zenpicker
        if: matrix.features == 'experimental,composites' && matrix.os == 'ubuntu-latest'
        run: cargo clippy -p zenpicker --all-targets -- -D warnings
      - name: Build zenpicker examples
        if: matrix.features == 'experimental,composites' && matrix.os == 'ubuntu-latest'
        run: cargo build -p zenpicker --examples

  cross:
    name: Cross (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - i686-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cross build --target ${{ matrix.target }} --features "experimental,composites"
      - name: Test
        run: cross test --target ${{ matrix.target }} --features "experimental,composites" --lib
