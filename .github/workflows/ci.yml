name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Public-API snapshot regen (tests/public_api_doc.rs) needs nightly
  # rustdoc + cargo-public-api; only the lint leg of the test matrix
  # carries them and runs the =check gate. Everywhere else the test skips.
  ZEN_API_DOC: off

# Superseded runs only waste runner queue — particularly the macOS
# jobs, which wait on GitHub's scarcest pool. Only the newest
# commit's run matters per ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }} / ${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-11-arm, macos-15-intel, macos-latest]
        features: ["", "experimental", "hdr", "experimental,hdr"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        if: matrix.features == 'experimental,hdr' && matrix.os == 'ubuntu-latest'
        run: cargo fmt --check
      - name: Clippy
        if: matrix.features == 'experimental,hdr' && matrix.os == 'ubuntu-latest'
        run: cargo clippy --features "${{ matrix.features }}" --all-targets -- -D warnings
      - name: Build
        run: cargo build --no-default-features --features "${{ matrix.features }}"
      - name: Test
        run: cargo test --no-default-features --features "${{ matrix.features }}" --lib
      - name: Build zenpicker
        run: cargo build -p zenpicker
      - name: Test zenpicker
        run: cargo test -p zenpicker --lib
      - name: Clippy zenpicker
        if: matrix.features == 'experimental,hdr' && matrix.os == 'ubuntu-latest'
        run: cargo clippy -p zenpicker --all-targets -- -D warnings
      - name: Build zenpicker examples
        if: matrix.features == 'experimental,hdr' && matrix.os == 'ubuntu-latest'
        run: cargo build -p zenpicker --examples
      - uses: dtolnay/rust-toolchain@nightly # rustdoc JSON for cargo-public-api
        if: matrix.features == 'experimental,hdr' && matrix.os == 'ubuntu-latest'
      - uses: dtolnay/rust-toolchain@stable # restore stable as default
        if: matrix.features == 'experimental,hdr' && matrix.os == 'ubuntu-latest'
      - uses: taiki-e/install-action@v2
        if: matrix.features == 'experimental,hdr' && matrix.os == 'ubuntu-latest'
        with:
          tool: cargo-public-api
      - name: Public-API snapshots are current
        if: matrix.features == 'experimental,hdr' && matrix.os == 'ubuntu-latest'
        run: cargo test -p zenanalyze --test public_api_doc
        env:
          ZEN_API_DOC: check

  zenpredict:
    name: zenpredict (${{ matrix.os }} / ${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-11-arm, macos-15-intel, macos-latest]
        # zenpredict has 3 valid feature combos (`advanced` requires `std`):
        #   ""             — no_std + alloc, runtime only
        #   "std"          — full runtime (lean: predict + argmin_masked)
        #   "std,advanced" — full runtime + typed multi-output / safety /
        #                    rescue / top-K / scorer-hybrid API
        features: ["", "std", "std,advanced"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        if: matrix.features == 'std,advanced' && matrix.os == 'ubuntu-latest'
        run: cargo fmt -p zenpredict --check
      - name: Clippy
        if: matrix.features == 'std,advanced' && matrix.os == 'ubuntu-latest'
        run: cargo clippy -p zenpredict --no-default-features --features "${{ matrix.features }}" --all-targets -- -D warnings
      - name: Build
        run: cargo build -p zenpredict --no-default-features --features "${{ matrix.features }}"
      - name: Test (lib)
        run: cargo test -p zenpredict --no-default-features --features "${{ matrix.features }}" --lib
      - name: Test (integration)
        if: matrix.features == 'std,advanced'
        run: cargo test -p zenpredict --no-default-features --features "${{ matrix.features }}" --tests
      - name: Test (doc)
        if: matrix.features == 'std,advanced' && matrix.os == 'ubuntu-latest'
        run: cargo test -p zenpredict --no-default-features --features "${{ matrix.features }}" --doc

  cross:
    name: Cross (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - i686-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cross build --target ${{ matrix.target }} --features "experimental,hdr"
      - name: Test
        env:
          # Surfaces inside the qemu guest so tests can detect emulated runtime
          # and apply looser timing thresholds. `cross` passes through
          # `CROSS_RUNTIME` automatically (passthrough is the default for
          # uppercase env vars set in the calling shell).
          CROSS_RUNTIME: "1"
        run: cross test --target ${{ matrix.target }} --features "experimental,hdr" --lib
      # zenpredict — 32-bit and big-endian-adjacent coverage. Critical
      # because Model::from_bytes does u32 / usize arithmetic that wraps
      # on 32-bit; checked_mul guards exist but live-fire tests confirm.
      - name: Build zenpredict
        run: cross build -p zenpredict --target ${{ matrix.target }} --no-default-features --features "std,advanced"
      - name: Test zenpredict
        env:
          CROSS_RUNTIME: "1"
        run: cross test -p zenpredict --target ${{ matrix.target }} --no-default-features --features "std,advanced" --lib
