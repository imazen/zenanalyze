[package]
name = "zenpredict"
version = "0.2.1"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/imazen/zenanalyze"
description = "Zero-copy MLP runtime: parse a packed binary model (ZNPR v3), run scaler + forward pass, surface typed metadata, run masked argmin for codec-config selection. Core of zenjpeg/zenwebp/zenavif/zenjxl picker selection and zensim perceptual distance. Bake-side composer lives in the sibling `zenpredict-bake` crate."
keywords = ["mlp", "inference", "zero-copy", "no-std"]
categories = ["multimedia::images", "no-std"]
authors = ["Lilith River <lilith@imazen.io>"]
rust-version = "1.93"
readme = "README.md"

[lib]
name = "zenpredict"

[features]
default = ["std"]
# `std::error::Error` impls and `f32::exp` for the linear-domain
# argmin transform. `no_std + alloc` builds drop these â€” score
# transforms beyond `Identity` will currently silently degrade (see
# `argmin::ScoreTransform::Exp` docs).
std = []
# Advanced runtime extras for picker pipelines: typed multi-output
# API (`output_spec::*`, `predict_with_specs*`), bake-time safety
# metadata reader (`safety::*`), two-shot rescue framework
# (`rescue::*`), and cached top-K argmin / scorer hybrids
# (`argmin_masked_top_k*`, `pick_with_confidence*`,
# `*_with_scorer*`). The wire format parses these sections
# unconditionally â€” gating only controls the typed Rust API. Codec
# runtimes that only call `predict` / `argmin_masked` stay lean by
# default; per-codec pickers that need the extras opt in.
advanced = []

[dependencies]
# Zero-copy byte â†’ typed slice reinterpret without `unsafe` in our
# tree. Tiny, no_std, well-audited.
bytemuck = { version = "1.25.0", default-features = false, features = ["derive"] }
# `f32::ln` / `f32::ln_1p` are not in `core`. `no_std` builds need
# `libm`; `std` builds call `f32::ln`/`f32::ln_1p` directly via the
# `cfg(feature = "std")` arm in `feature_transform::FeatureTransform::apply`.
# Kept as an unconditional dep because cargo doesn't allow
# `cfg(not(feature = "X"))` on a target-dependency and the `optional`
# pattern requires consumers to opt in to a private feature â€” bad UX
# for a 13 KB compile-only cost on std builds.
libm = { version = "0.2.16", default-features = false }
# LZ4 block decoder for whole-bake-compressed payloads (header flag
# bit 0 + algo nibble 1). ~4 KB binary; pure-safe-Rust + no_std.
# Always available â€” the wire format may set the compressed flag,
# so the loader needs decompression unconditionally.
# `default-features = false` strips the encoder/frame helpers; we
# only need `safe-decode`. The bake-side crate pulls `safe-encode`
# separately.
lz4_flex = { version = "0.11.6", default-features = false, features = ["safe-decode"] }


[dev-dependencies]
rand = { version = "0.9.2", default-features = false, features = ["std", "std_rng", "small_rng"] }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = { level = "warn", priority = -1 }
cast_possible_truncation = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
